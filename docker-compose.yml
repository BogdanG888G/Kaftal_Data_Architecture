services:
  airflow:
    build:
      context: .
    container_name: airflow
    networks:
      - default
    ports:
      - "8080:8080"
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
      # Фиксированные креды для standalone
      _AIRFLOW_WWW_USER_USERNAME: admin
      _AIRFLOW_WWW_USER_PASSWORD: admin123
      DBT_PROFILES_DIR: /opt/airflow/dbt
    volumes:
      - ${AIRFLOW_PROJ_DIR:-.}/dags:/opt/airflow/dags
      - ${AIRFLOW_PROJ_DIR:-.}/logs:/opt/airflow/logs
      - ${AIRFLOW_PROJ_DIR:-.}/config:/opt/airflow/config
      - ${AIRFLOW_PROJ_DIR:-.}/plugins:/opt/airflow/plugins
      - ${AIRFLOW_PROJ_DIR:-.}/data:/opt/airflow/data
      - ${AIRFLOW_PROJ_DIR:-.}/jobs:/opt/airflow/jobs
      - ./dbt_part:/opt/airflow/dbt
    user: "${AIRFLOW_UID:-50000}:0"
    command: >
      bash -c "
        set -e
        airflow db migrate
        airflow standalone
      "
    depends_on:
      postgres:
        condition: service_healthy
    restart: always

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-db-volume:/var/lib/postgresql/data
    ports:
      - '5433:5432'
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 90s
      retries: 5
      start_period: 5s
    restart: always

  minio:
    image: minio/minio:latest
    container_name: minio
    ports:
      - "9000:9000"  # API (для boto3)
      - "9001:9001"  # UI (веб-интерфейс)
    environment:
      MINIO_ROOT_USER: minioadmin      # логин
      MINIO_ROOT_PASSWORD: minioadmin  # пароль (минимум 8 символов)
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data  # данные сохраняются в volume

  spark-master:
    image: apache/spark:4.0.2-scala2.13-java17-python3-r-ubuntu
    container_name: spark-master
    ports:
      - "8082:8080"
      - "7077:7077"
    environment:
      - SPARK_MASTER_HOST=spark-master
      - SPARK_MASTER_PORT=7077
      - SPARK_MASTER_WEBUI_PORT=8080
    command: >
      bash -c "
      /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master \
        --host spark-master \
        --port 7077 \
        --webui-port 8080
      "
    volumes:
      - ./spark/jobs:/opt/spark-jobs
      - ./data:/opt/data
      - spark-jars:/opt/spark/extra-jars
    networks:
      - default

  spark-worker:
    image: apache/spark:4.0.2-scala2.13-java17-python3-r-ubuntu
    container_name: spark-worker
    environment:
      - SPARK_WORKER_CORES=1
      - SPARK_WORKER_MEMORY=512m
      - SPARK_MASTER=spark://spark-master:7077
    command: >
      bash -c "
      /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker \
        spark://spark-master:7077
      "
    volumes:
      - spark-jars:/opt/spark/extra-jars
    depends_on:
      - spark-master
    networks:
      - default

  iceberg-rest:
    image: tabulario/iceberg-rest:latest
    container_name: iceberg-rest
    ports:
      - "8181:8181"
    environment:
      CATALOG_WAREHOUSE: s3://warehouse/    # бакет, а котором будет Lakehouse
      CATALOG_IO__IMPL: org.apache.iceberg.aws.s3.S3FileIO
      CATALOG_S3_ENDPOINT: http://minio:9000
      CATALOG_S3_PATH__STYLE__ACCESS: "true"
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      AWS_REGION: us-east-1
    depends_on:
      - minio
    restart: unless-stopped
    networks:
      - default

  jupyter:
    image: jupyter/pyspark-notebook:latest
    container_name: jupyter
    ports:
      - "8888:8888"
    environment:
      JUPYTER_ENABLE_LAB: "yes"
      SPARK_MASTER: "spark://spark-master:7077"
      GRANT_SUDO: "yes"
      JUPYTER_TOKEN: ""
    volumes:
      - ./notebooks:/home/jovyan/work
      - ./data:/home/jovyan/data
    command: start-notebook.sh --NotebookApp.token='' --NotebookApp.password=''
    depends_on:
      - spark-master
      - spark-worker
    networks:
      - default
    user: root
  
  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: clickhouse
    ports:
      - "8123:8123"
      - "9009:9000"
    volumes:
      - clickhouse-data:/var/lib/clickhouse
    environment:
      - CLICKHOUSE_USER=admin
      - CLICKHOUSE_PASSWORD=123
      - CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT=1
    networks:
      - default


  trino:
    image: trinodb/trino:435 
    container_name: trino
    ports:
      - "8085:8080"
    volumes:
      - ./trino/catalog:/etc/trino/catalog
    depends_on:
      - minio
      - clickhouse
      - iceberg-rest
    networks:
      - default

  superset:
    build:
      context: .
      dockerfile: Dockerfile.superset
    container_name: superset
    ports:
      - "8088:8088"
    environment:
      - SUPERSET_SECRET_KEY=supersecret123
      - ADMIN_USERNAME=admin
      - ADMIN_PASSWORD=admin
    command: >
      bash -c "
        superset db upgrade &&
        superset fab create-admin --username admin --firstname Admin --lastname Admin --email admin@admin.com --password admin &&
        superset init &&
        superset run -h 0.0.0.0 -p 8088
      "
    depends_on:
      - clickhouse
      - trino
    networks:
      - default
  

volumes:
  postgres-db-volume:
  minio-data:
  ivy-cache:        
  spark-jars:       
  clickhouse-data: